<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Password Hash Generator</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:420px;box-shadow:0 8px 30px rgba(0,0,0,0.1);}
  h2{color:#1a1a2e;margin-bottom:6px;font-size:1.2rem;}
  p{color:#888;font-size:13px;margin-bottom:20px;}
  label{font-size:13px;font-weight:600;color:#333;display:block;margin-bottom:6px;}
  input{width:100%;padding:12px;border:2px solid #e8e8e8;border-radius:12px;font-size:15px;margin-bottom:14px;outline:none;}
  input:focus{border-color:#ff6b35;}
  button{width:100%;background:linear-gradient(135deg,#ff6b35,#e94560);color:#fff;border:none;padding:13px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;}
  .result{margin-top:18px;display:none;}
  .result label{margin-bottom:6px;}
  textarea{width:100%;padding:12px;border:2px solid #4ade80;border-radius:12px;font-size:13px;font-family:monospace;resize:none;background:#f0fff4;color:#166534;}
  .copy-btn{width:100%;margin-top:10px;background:#1a1a2e;color:#fff;border:none;padding:11px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;}
  .copied{background:#4ade80;color:#166534;}
  .note{margin-top:14px;background:#fff8e6;border-radius:12px;padding:12px;font-size:12px;color:#92400e;}
</style>
</head>
<body>
<div class="card">
  <h2>🔐 Password Hash Generator</h2>
  <p>Admin panel ke liye password ka SHA-256 hash banao</p>

  <label>Apna Password Daalo</label>
  <input type="password" id="pwdInput" placeholder="Apna password likho..."/>

  <button onclick="generateHash()">Generate Hash →</button>

  <div class="result" id="result">
    <label>Ye Hash copy karo — admin.js mein daalna hai:</label>
    <textarea id="hashOutput" rows="3" readonly></textarea>
    <button class="copy-btn" id="copyBtn" onclick="copyHash()">📋 Hash Copy Karo</button>
  </div>

  <div class="note">
    ⚠️ Hash generate karne ke baad ye page delete kar do GitHub se — sensitive tool hai.
  </div>
</div>

<script>
async function generateHash() {
  const pwd = document.getElementById('pwdInput').value.trim();
  if (!pwd) { alert('Password daalo pehle!'); return; }

  const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
  const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');

  document.getElementById('hashOutput').value = hash;
  document.getElementById('result').style.display = 'block';
  document.getElementById('copyBtn').textContent = '📋 Hash Copy Karo';
  document.getElementById('copyBtn').className = 'copy-btn';
}

function copyHash() {
  const hash = document.getElementById('hashOutput').value;
  navigator.clipboard.writeText(hash).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ Copied!';
    btn.className = 'copy-btn copied';
    setTimeout(() => {
      btn.textContent = '📋 Hash Copy Karo';
      btn.className = 'copy-btn';
    }, 2000);
  }).catch(() => {
    // Fallback for older browsers
    document.getElementById('hashOutput').select();
    document.execCommand('copy');
    alert('Hash copy ho gaya!');
  });
}
</script>
</body>
</html>
